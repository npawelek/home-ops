[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
KAGI_API_KEY = { value = "{{exec(command='sops -d env.sops.yaml | yq .KAGI_API_KEY')}}", tools = true, redact = true }
SEARXNG_URL = { value = "{{exec(command='sops -d env.sops.yaml | yq .SEARXNG_URL')}}", tools = true, redact = true }
LOCAL_LLM_URL = { value = "{{exec(command='sops -d env.sops.yaml | yq .LOCAL_LLM_URL')}}", tools = true, redact = true }
LMSTUDIO_API_KEY = { value = "{{exec(command='sops -d env.sops.yaml | yq .LMSTUDIO_API_KEY')}}", tools = true, redact = true }
LMSTUDIO_MODEL = { value = "{{exec(command='sops -d env.sops.yaml | yq .LMSTUDIO_MODEL')}}", tools = true, redact = true }
SECRET_DOMAIN = { value = "{{exec(command='sops -d env.sops.yaml | yq .SECRET_DOMAIN')}}", tools = true, redact = true }
HOMEASSISTANT_URL = { value = "{{exec(command='sops -d env.sops.yaml | yq .HOMEASSISTANT_URL')}}", tools = true, redact = true }
HOMEASSISTANT_TOKEN = { value = "{{exec(command='sops -d env.sops.yaml | yq .HOMEASSISTANT_TOKEN')}}", tools = true, redact = true }
GRAFANA_URL = { value = "{{exec(command='sops -d env.sops.yaml | yq .GRAFANA_URL')}}", tools = true, redact = true }
GRAFANA_SERVICE_ACCOUNT_TOKEN = { value = "{{exec(command='sops -d env.sops.yaml | yq .GRAFANA_SERVICE_ACCOUNT_TOKEN')}}", tools = true, redact = true }
GRAFANA_ORG_ID = "1"
OPENBRAIN_MCP_KEY = { value = "{{exec(command='sops -d env.sops.yaml | yq .OPENBRAIN_MCP_KEY')}}", tools = true, redact = true }
AWS_PROFILE = "default"
AWS_REGION = "us-east-1"

[settings]
experimental = true
python.uv_venv_auto = true

[hooks]
postinstall = "mise run i"
enter = "mise run check-deps"

[tools]
"aqua:astral-sh/uv" = "0.11.28"
"aqua:awscli" = "2.35.15"
"aqua:budimanjojo/talhelper" = "3.1.12"
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:cilium/cilium-cli" = "0.19.5"
"aqua:cli/cli" = "2.96.0"
"aqua:cue-lang/cue" = "0.17.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.0"
"aqua:getsops/sops" = "3.13.2"
"aqua:go-task/task" = "3.52.0"
"aqua:google/go-containerregistry" = "0.21.7"
"aqua:grafana/mcp-grafana" = "0.17.2"
"aqua:helm/helm" = "3.21.2"
"aqua:helmfile/helmfile" = "1.7.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubectl" = "1.36.1"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:pre-commit" = "4.6.0"
"aqua:siderolabs/talos" = "1.13.3"
"aqua:yannh/kubeconform" = "0.8.0"
"node" = "26.5.0"
"pipx:asitop" = "0.0.24"
"pipx:flux-local" = "8.4.0"
"pipx:ha-mcp" = "7.11.0"
"pipx:makejinja" = "2.8.2"
"pipx:mcp-compressor" = "0.13.0"
"pipx:yamllint" = "1.38.0"
"python" = "3.14.6"

[shell_alias]
k = "kubectl"

[tasks.install]
description = "Install Python dependencies"
alias = "i"
run = "uv pip install -r requirements.txt"

[tasks.check-deps]
description = "Check if Python dependencies need updating"
silent = true
run = '''
  OUTDATED=$(uv pip list --outdated 2>/dev/null)
  if [ -n "$OUTDATED" ]; then
    echo "⚠️  Python dependencies have updates available. Run 'mise install' to update"
  fi
'''
