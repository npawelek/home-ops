    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/0b6deb91fb651b3885f5f703d894096cbb71e9cd59324a5ea84f9919427995da
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "6c:92:bf:65:0b:66"
        dhcp: false
        addresses:
          - "192.168.0.35/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.0.1"
        mtu: 9000
    patches:
      - "@./patches/nodes/pella-longhorn-volume.yaml"
  - hostname: "donnager"
