---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.0.75:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.0.75"
additionalMachineCertSans: *sans

clusterPodNets: ["10.32.0.0/12"]
clusterSvcNets: ["10.96.0.0/12"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "m1"
    ipAddress: "192.168.0.27"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/0b6deb91fb651b3885f5f703d894096cbb71e9cd59324a5ea84f9919427995da
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e0:51:d8:1f:8a:f9"
        dhcp: false
        addresses:
          - "192.168.0.27/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.0.1"
        mtu: 9000
        vip:
          ip: "192.168.0.75"
  - hostname: "m2"
    ipAddress: "192.168.0.28"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/0b6deb91fb651b3885f5f703d894096cbb71e9cd59324a5ea84f9919427995da
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e0:51:d8:1f:9a:a9"
        dhcp: false
        addresses:
          - "192.168.0.28/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.0.1"
        mtu: 9000
        vip:
          ip: "192.168.0.75"
  - hostname: "m3"
    ipAddress: "192.168.0.29"
