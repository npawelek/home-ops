    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/0b6deb91fb651b3885f5f703d894096cbb71e9cd59324a5ea84f9919427995da
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e0:51:d8:1f:36:3f"
        dhcp: false
        addresses:
          - "192.168.0.29/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.0.1"
