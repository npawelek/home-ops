---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentelemetry-collector-agent
  namespace: monitoring-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opentelemetry-collector-agent
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - nodes/metrics
      - nodes/proxy
      - nodes/stats
      - namespaces
      - services
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opentelemetry-collector-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opentelemetry-collector-agent
subjects:
  - kind: ServiceAccount
    name: opentelemetry-collector-agent
    namespace: monitoring-agents
