---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app opentelemetry-agent
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  path: ./kubernetes/apps/monitoring-agents/opentelemetry-agent/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: monitoring-agents
  wait: true
  dependsOn:
    - name: opentelemetry-operator
      namespace: monitoring
    - name: opentelemetry-gateway
      namespace: monitoring
