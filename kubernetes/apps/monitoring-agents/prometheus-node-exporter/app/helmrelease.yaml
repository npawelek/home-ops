---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-node-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: prometheus-node-exporter
  interval: 1h
  values:
    fullnameOverride: prometheus-node-exporter
    hostNetwork: true
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    prometheus:
      monitor:
        enabled: true
        additionalLabels:
          monitoring: otel
        interval: 30s
