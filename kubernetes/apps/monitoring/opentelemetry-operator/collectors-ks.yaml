---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app opentelemetry-collectors
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  path: ./kubernetes/apps/monitoring/opentelemetry-operator/collectors
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: monitoring
  wait: true
  dependsOn:
    - name: opentelemetry-operator
      namespace: monitoring
    - name: victoriametrics
      namespace: monitoring
    - name: loki
      namespace: monitoring
