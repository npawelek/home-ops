---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  chartRef:
    kind: OCIRepository
    name: grafana
  interval: 1h
  values:
    admin:
      existingSecret: grafana-secrets
      userKey: admin_user
      passwordKey: admin_password
    env:
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: "true"
      GF_EXPLORE_ENABLED: "true"
      GF_LOG_MODE: console
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    # phase 2: uncomment after terraform applies authentik oauth config
    # and client_secret is retrieved
    # envValueFrom:
    #   GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    #     secretKeyRef:
    #       name: grafana-secret
    #       key: client_secret
    grafana.ini:
      analytics:
        check_for_updates: false
      server:
        root_url: "{{.Release.Name}}.${SECRET_DOMAIN}"
      auth:
        # oauth_auto_login: true
        disable_login_form: false
        # phase 2: uncomment after terraform applies authentik oauth config
        # and client_secret is retrieved
        # auth.generic_oauth:
        #   enabled: true
        #   name: Authentik
        #   icon: signin
        #   client_id: grafana
        #   client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
        #   scopes: openid profile email
        #   auth_url: https://auth.${SECRET_DOMAIN}/application/o/authorize/
        #   token_url: https://auth.${SECRET_DOMAIN}/application/o/token/
        #   api_url: https://auth.${SECRET_DOMAIN}/application/o/userinfo/
        #   role_attribute_path: "contains(groups[*], 'authentik_admins') && 'Admin' || 'Viewer'"
        #   signout_redirect_url: https://auth.${SECRET_DOMAIN}/application/o/grafana/end-session/
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            access: proxy
            url: http://victoriametrics-server.monitoring.svc.cluster.local:8428
            isDefault: true
            jsonData:
              prometheusType: VictoriaMetrics
          - name: Loki
            type: loki
            access: proxy
            url: http://loki.monitoring.svc.cluster.local:3100
    route:
      main:
        enabled: true
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        hostnames:
          - "{{.Release.Name}}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: gateway
            sectionName: https
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 3000
    serviceMonitor:
      enabled: true
      labels:
        monitoring: otel
      path: /metrics
      interval: 60s
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 1Gi
    replicas: 1
    securityContext:
      runAsNonRoot: true
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    containerSecurityContext:
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
