---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-terraform
  namespace: monitoring
spec:
  dependsOn:
    - name: tofu-controller
      namespace: flux-system
    - name: grafana
      namespace: monitoring
  interval: 1h
  path: ./kubernetes/apps/monitoring/grafana/terraform
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: monitoring
  wait: false
