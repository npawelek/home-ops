apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoriametrics-data
  labels:
    recurring-job-group.longhorn.io/backup-24h: disabled
    recurring-job-group.longhorn.io/default: enabled
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
