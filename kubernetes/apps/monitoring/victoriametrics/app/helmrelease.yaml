---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoriametrics
  interval: 1h
  values:
    fullnameOverride: victoriametrics
    server:
      persistentVolume:
        enabled: true
        existingClaim: victoriametrics-data
      retentionPeriod: 14d
      serviceMonitor:
        enabled: true
      route:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: gateway
            sectionName: https
        hostnames:
          - victoriametrics.${SECRET_DOMAIN}
