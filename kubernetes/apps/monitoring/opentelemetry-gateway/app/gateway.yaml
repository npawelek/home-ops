---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: gateway
spec:
  mode: statefulset
  replicas: 2
  serviceAccount: opentelemetry-collector-gateway
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: opentelemetry-collector
                app.kubernetes.io/instance: gateway
            topologyKey: kubernetes.io/hostname
  targetAllocator:
    enabled: true
    replicas: 1
    allocationStrategy: consistent-hashing
    serviceAccount: opentelemetry-targetallocator
    prometheusCR:
      enabled: true
      scrapeInterval: 30s
      serviceMonitorSelector:
        matchLabels:
          monitoring: otel
      podMonitorSelector:
        matchLabels:
          monitoring: otel
  env:
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: k8s.cluster.name=home-ops
  observability:
    metrics:
      enableMetrics: true
      disablePrometheusAnnotations: true
      extraLabels:
        monitoring: otel
  initContainers:
    - name: fix-storage-permissions
      # yamllint disable-line rule:line-length
      image: public.ecr.aws/docker/library/alpine:3.23.4@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
      command: ["sh", "-c", "chown -R 10001:10001 /var/lib/otelcol_gateway"]
      volumeMounts:
        - name: storage
          mountPath: /var/lib/otelcol_gateway
      securityContext:
        runAsUser: 0
  volumeMounts:
    - name: storage
      mountPath: /var/lib/otelcol_gateway
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 3Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  config:
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      file_storage:
        directory: /var/lib/otelcol_gateway
      zpages:
        endpoint: 0.0.0.0:55679

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318

      prometheus:
        config:
          scrape_configs: []

      syslog:
        tcp:
          listen_address: 0.0.0.0:1514
        udp:
          listen_address: 0.0.0.0:1514
        protocol: rfc3164
        location: America/Chicago
        enable_octet_counting: false
        operators:
          - type: move
            from: attributes.hostname
            to: resource["host.name"]
          - type: move
            from: attributes.appname
            to: resource["service.name"]
          - type: move
            from: attributes.message
            to: body

    processors:
      memory_limiter:
        check_interval: 2s
        limit_percentage: 80
        spike_limit_percentage: 25

      batch:
        send_batch_size: 2000
        send_batch_max_size: 3000
        timeout: 10s

      resourcedetection:
        detectors: [env]
        timeout: 5s

      # Agent already enriched k8s attributes — preserve without re-lookup.
      # passthrough: true avoids from: connection, which would resolve to the
      # agent pod IP rather than the original source pod.
      k8s_attributes/passthrough:
        auth_type: serviceAccount
        passthrough: true

      k8s_attributes/enrich:
        auth_type: serviceAccount
        passthrough: false
        wait_for_metadata: true
        extract:
          metadata:
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.namespace.name
            - k8s.node.name
            - container.image.name
            - container.image.tag
          labels:
            - tag_name: app.kubernetes.io/name
              key: app.kubernetes.io/name
              from: pod
            - tag_name: app.kubernetes.io/component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

      # Explicitly promote only low-cardinality resource attributes as Prometheus labels.
      # Excludes k8s.pod.uid, container.image.tag, container.image.name — unbounded cardinality.
      transform/promote_labels:
        metric_statements:
          - context: datapoint
            statements:
              - set(attributes["cluster"], resource.attributes["k8s.cluster.name"])
              - set(attributes["namespace"], resource.attributes["k8s.namespace.name"])
              - set(attributes["node"], resource.attributes["k8s.node.name"])
              - set(attributes["pod"], resource.attributes["k8s.pod.name"])
              - set(attributes["container"], resource.attributes["k8s.container.name"])
              - set(attributes["deployment"], resource.attributes["k8s.deployment.name"])
              - set(attributes["daemonset"], resource.attributes["k8s.daemonset.name"])
              - set(attributes["statefulset"], resource.attributes["k8s.statefulset.name"])
              - set(attributes["app"], resource.attributes["app.kubernetes.io/name"])
              - set(attributes["component"], resource.attributes["app.kubernetes.io/component"])

      filter/metrics_drop:
        error_mode: ignore
        metrics:
          metric:
            - 'IsMatch(name, "^go_") and not IsMatch(resource.attributes["service.name"], "otelcol.*")'

    # filter/logs_drop:
    #   error_mode: ignore
    #   logs:
    #     log_record:
    #       - 'severity_number < SEVERITY_NUMBER_INFO'
    exporters:
      prometheusremotewrite:
        endpoint: http://victoriametrics-server.monitoring.svc.cluster.local:8428/api/v1/write
        tls:
          insecure: true
        resource_to_telemetry_conversion:
          enabled: false
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        max_batch_request_parallelism: 10
        remote_write_queue:
          enabled: true
          num_consumers: 10
          queue_size: 10000

      otlp_http/loki:
        endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          storage: file_storage
          num_consumers: 10
          queue_size: 5000

    service:
      telemetry:
        logs:
          level: warn
        metrics:
          level: detailed
      extensions:
        - health_check
        - file_storage
        - zpages
      pipelines:
        metrics/scraped:
          receivers:
            - prometheus
          processors:
            - memory_limiter
            - filter/metrics_drop
            - k8s_attributes/enrich
            - resourcedetection
            - transform/promote_labels
            - batch
          exporters:
            - prometheusremotewrite
        metrics/agent:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - filter/metrics_drop
            - k8s_attributes/passthrough
            - resourcedetection
            - transform/promote_labels
            - batch
          exporters:
            - prometheusremotewrite
        logs/agent:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8s_attributes/passthrough
            - resourcedetection
            - batch
          exporters:
            - otlp_http/loki
        logs/syslog:
          receivers:
            - syslog
          processors:
            - memory_limiter
            - resourcedetection
            - batch
          exporters:
            - otlp_http/loki
