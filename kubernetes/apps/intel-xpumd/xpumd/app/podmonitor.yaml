---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: xpumd
  labels:
    monitoring: otel
spec:
  podMetricsEndpoints:
    - port: http
      interval: 30s
      path: /metrics
  selector:
    matchLabels:
      app.kubernetes.io/name: xpumd
  namespaceSelector:
    matchNames:
      - intel-xpumd
