---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vane
spec:
  dependsOn:
    - name: envoy-gateway
      namespace: gateway
    - name: longhorn
      namespace: longhorn-system
    - name: searxng
  interval: 1h
  path: ./kubernetes/apps/network/vane/app
  postBuild:
    substitute:
      APP: *app
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
