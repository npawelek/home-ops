---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vane
spec:
  chartRef:
    kind: OCIRepository
    name: vane
  interval: 1h
  values:
    controllers:
      vane:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: public.ecr.aws/docker/library/alpine
              tag: 3.23.4@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
            command:
              - /bin/sh
              - -c
              - chown -Rv 1000:1000 /home/vane/data /home/vane/uploads
        containers:
          app:
            image:
              repository: docker.io/itzcrazykns1337/vane
              # slim variant excludes built-in SearXNG; relies on external SEARXNG_URL
              tag: slim-v1.12.2@sha256:d2878cf9c91962aa3fc053b59bc9b89adcbdcaeb7ee36b54906e853464b2c190
            env:
              TZ: ${TIMEZONE}
              SEARXNG_API_URL: "http://searxng.network.svc.cluster.local:8080"
              OPENAI_BASE_URL: "https://lmstudio.${SECRET_DOMAIN}/v1"
              OPENAI_API_KEY: "sk-xx"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: vane-data
        globalMounts:
          - path: /home/vane/data
      uploads:
        type: emptyDir
        globalMounts:
          - path: /home/vane/uploads
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{.Release.Name}}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: gateway
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
