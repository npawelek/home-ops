apiVersion: v1
kind: Service
metadata:
  name: lmstudio
spec:
  ports:
    - name: http
      port: 1234
      targetPort: 1234
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: lmstudio
  labels:
    kubernetes.io/service-name: lmstudio
addressType: IPv4
endpoints:
  - addresses:
      - ${LMSTUDIO_ADDR}
ports:
  - name: http
    port: 1234
    protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lmstudio
spec:
  hostnames:
    - lmstudio.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: gateway
      sectionName: https
  rules:
    - backendRefs:
        - name: lmstudio
          port: 1234
