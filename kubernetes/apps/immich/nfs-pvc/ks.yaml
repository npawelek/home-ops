---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nfs-pvc-immich
spec:
  targetNamespace: immich
  path: ./kubernetes/apps/immich/nfs-pvc/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: nfs-volumes
      namespace: storage
