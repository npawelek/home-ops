---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pr-review
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pr-review
rules:
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["helmrepositories", "ocirepositories"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pr-review
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pr-review
subjects:
  - kind: ServiceAccount
    name: pr-review
    namespace: ci
