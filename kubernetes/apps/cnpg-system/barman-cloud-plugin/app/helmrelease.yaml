---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: barman-cloud-plugin
spec:
  chartRef:
    kind: OCIRepository
    name: barman-cloud-plugin
  interval: 1h
  values:
    image:
      repository: ghcr.io/cloudnative-pg/plugin-barman-cloud
      tag: v0.12.0@sha256:0b9c428123313d93efbec26bdef85e91f2130a7bd8e382a767de12b3938f6271

    replicaCount: 2

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi
