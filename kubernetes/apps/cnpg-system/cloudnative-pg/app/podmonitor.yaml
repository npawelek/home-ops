---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cloudnative-pg
  labels:
    monitoring: otel
spec:
  podMetricsEndpoints:
    - port: metrics
      interval: "30s"
      path: /metrics
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  namespaceSelector:
    matchNames:
      - cnpg-system
