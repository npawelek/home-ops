---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &name kubernetes-replicator
spec:
  interval: 30m
  chart:
    spec:
      chart: *name
      version: 2.10.0
      sourceRef:
        kind: HelmRepository
        name: mittwald
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *name
    image:
      repository: quay.io/mittwald/kubernetes-replicator
      tag: v2.10.1@sha256:3787c84ceb41e4ca582c42bce31880fa09080e5890b9a5e87f0747882e8778e8
    args:
      - -resync-period=5m
    grantClusterAdmin: false
    serviceAccount:
      create: true
      name: *name
      privileges:
        - apiGroups: [""]
          resources: ["namespaces"]
        - apiGroups: [""]
          resources: ["secrets", "configmaps"]
        - apiGroups: ["rbac.authorization.k8s.io"]
          resources: ["roles", "rolebindings"]
