---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mqtt-${OLD_SECRET_DOMAIN/./-}
spec:
  secretName: mqtt-${OLD_SECRET_DOMAIN/./-}-tls
  duration: 2160h
  renewBefore: 576h
  privateKey:
    rotationPolicy: Always
    size: 4096
    algorithm: RSA
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mqtt.${OLD_SECRET_DOMAIN}
