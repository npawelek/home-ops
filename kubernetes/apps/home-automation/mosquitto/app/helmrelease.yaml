# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  chartRef:
    kind: OCIRepository
    name: mosquitto
  interval: 1h
  values:
    controllers:
      mosquitto:
        type: statefulset
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-auth:
            image:
              repository: public.ecr.aws/docker/library/alpine
              tag: 3.23.4@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
            command:
              - /bin/sh
              - -c
              - |
                cp /tmp/auth/passwd /mosquitto/configinc/auth/passwd
                cp /tmp/auth/acl /mosquitto/configinc/auth/acl
                chmod 0700 /mosquitto/configinc/auth/passwd /mosquitto/configinc/auth/acl
                chown 1883:1883 /mosquitto/configinc/auth/passwd /mosquitto/configinc/auth/acl
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.1.2-alpine@sha256:db2e17af6d4ee7765267bccb65cb37c8b7193fa17112e77775f842d75c77478b
            env:
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 15m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      mosquitto:
        controller: mosquitto
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: ${MOSQUITTO_LB}
        externalTrafficPolicy: Local
        ports:
          mqtt:
            port: 1883
            protocol: TCP
          mqtts:
            port: 8883
            protocol: TCP
    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: mosquitto-data
        globalMounts:
          - path: /mosquitto/data
      configinc:
        type: configMap
        name: mosquitto-conf
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
          - path: /mosquitto/configinc/mqtt.conf
            subPath: mqtt.conf
      mosquitto-auth:
        type: secret
        name: mosquitto-secrets
        advancedMounts:
          mosquitto:
            init-auth:
              - path: /tmp/auth
                readOnly: true
      mosquitto-auth-rw:
        type: emptyDir
        globalMounts:
          - path: /mosquitto/configinc/auth
      mosquitto-tls:
        type: secret
        name: mqtt-${OLD_SECRET_DOMAIN/./-}-tls
        globalMounts:
          - path: /etc/ssl/mosquitto
            readOnly: true
