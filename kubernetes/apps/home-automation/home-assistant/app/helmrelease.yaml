# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hass
spec:
  chartRef:
    kind: OCIRepository
    name: home-assistant
  interval: 1h
  values:
    controllers:
      hass:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              # TODO: switch to home-operations container
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.4.1@sha256:4e08aa7e5151e6ff86d389da662f736decde9c544994e78f307c98b1c3c39cfb
            env:
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: home-assistant-env-secrets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /manifest.json
                    port: &port 8123
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /manifest.json
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 1000Mi
              limits:
                memory: 2500Mi
      code-server:
        type: statefulset
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: hass
                  topologyKey: kubernetes.io/hostname
        containers:
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.113.0@sha256:1cc68ebb18b6de53dadf95a69f186b80535b49821937697ef148fe4751ef92e1
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode/extensions
              - /config
            env:
              TZ: ${TIMEZONE}
              # HASS_SERVER: http://hass-app.home-automation.svc.cluster.local:8123
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: hass
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: ${HOME_ASSISTANT_LB}
        externalTrafficPolicy: Local
        ports:
          http:
            port: 8123
            protocol: TCP
      code-server:
        controller: code-server
        ports:
          http:
            port: 8080
            protocol: TCP
    route:
      app:
        hostnames: ["{{.Release.Name}}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: gateway
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 8123
      code-server:
        hostnames: ["{{.Release.Name}}-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: gateway
            sectionName: https
        rules:
          - backendRefs:
              - identifier: code-server
                port: 8080
    persistence:
      config:
        existingClaim: home-assistant-config
        advancedMounts:
          hass:
            app:
              - path: /config
          code-server:
            code-server:
              - path: /config
      sshconfig:
        type: configMap
        name: home-assistant-ssh-config
        advancedMounts:
          hass:
            app:
              - path: /root/.ssh/config
                subPath: config
                readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          code-server:
            code-server:
              - path: /tmp
              - path: /nonexistent
              - path: /config/.vscode/User/History
                subPath: history
              - path: /config/.vscode/logs
                subPath: logs
