# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nodered
spec:
  chartRef:
    kind: OCIRepository
    name: node-red
  interval: 1h
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      nodered:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: nodered/node-red
              tag: 4.1.11-18-minimal@sha256:41796f01aa3b6c1c163375b53ce4147c613fe98dc1fda316130829ee6c4466da
            env:
              TZ: ${TIMEZONE}
              FLOWS: flows.json
              NODE_RED_ENABLE_PROJECTS: 'true'
              NODE_RED_ENABLE_SAFE_MODE: 'false'
            resources:
              requests:
                cpu: 100m
                memory: 500Mi
              limits:
                memory: 1000Mi
    service:
      nodered:
        controller: nodered
        ports:
          http:
            port: 1880
            protocol: TCP
    route:
      nodered:
        parentRefs:
          - name: envoy-internal
            namespace: gateway
        hostnames:
          - "{{.Release.Name}}.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: nodered
                port: 1880
    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: node-red-data
        globalMounts:
          - path: /data
