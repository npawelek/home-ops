# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: copilot-api
spec:
  chartRef:
    kind: OCIRepository
    name: copilot-api
  interval: 1h
  values:
    controllers:
      copilot-api:
        annotations:
          reloader.stakater.com/auto: "true"
        type: deployment
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/node
              tag: 25.9.0-alpine3.23@sha256:bdf2cca6fe3dabd014ea60163eca3f0f7015fbd5c7ee1b0e9ccb4ced6eb02ef4
            command:
              - /bin/sh
              - -c
              - |
                # renovate: datasource=npm depName=copilot-api
                COPILOT_API_VERSION=0.7.0
                # renovate: datasource=npm depName=@anthropic-ai/claude-code
                CLAUDE_CODE_VERSION=2.1.121
                npm install -g copilot-api@${COPILOT_API_VERSION} @anthropic-ai/claude-code@${CLAUDE_CODE_VERSION} \
                  && copilot-api start --proxy-env --github-token "$GH_TOKEN"
            env:
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: copilot-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 4141
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: false
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{.Release.Name}}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: gateway
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
