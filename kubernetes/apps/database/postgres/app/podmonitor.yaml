---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgres
  namespace: database
  labels:
    monitoring: otel
spec:
  podMetricsEndpoints:
    - port: metrics
      interval: "30s"
      path: /metrics
  selector:
    matchLabels:
      cnpg.io/cluster: postgres
  namespaceSelector:
    matchNames:
      - database
