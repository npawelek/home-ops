---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  interval: 1h
  values:
    replicaCount: 2
    concurrency: 24
    allowCrossNamespaceRefs: true

    image:
      repository: ghcr.io/flux-iac/tofu-controller
      tag: v0.16.2@sha256:6ac5e98c25eff86c900df738eba92d7a083c6e5c6109b3b650ffce559e138250

    runner:
      image:
        repository: ghcr.io/flux-iac/tf-runner
        tag: v0.16.3@sha256:b8632592cd6674517e36cb412c856cdc77c3a6f6b16e42af030f683f16178d99
      grpc:
        maxMessageSize: 30
      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 400m
          memory: 64Mi

    metrics:
      enabled: true

    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      seccompProfile:
        type: RuntimeDefault
