---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  interval: 1h
  values:
    replicaCount: 2
    concurrency: 24
    allowCrossNamespaceRefs: true

    image:
      repository: ghcr.io/flux-iac/tofu-controller
      tag: v0.16.4@sha256:7f95e82a29c6f0c49965a1e248f2c1713593053819175dd2624c474b05ef5263

    runner:
      image:
        repository: ghcr.io/flux-iac/tf-runner
        tag: v0.16.4@sha256:fc3af4d9b99f54cc92d4aec51d83117dcf373b79d8ed1dc6f69a4ac154184725
      grpc:
        maxMessageSize: 30
      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 400m
          memory: 64Mi

    metrics:
      enabled: true

    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      seccompProfile:
        type: RuntimeDefault
