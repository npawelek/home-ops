---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  interval: 1h
  values:
    replicaCount: 2
    concurrency: 24
    allowCrossNamespaceRefs: true

    image:
      repository: ghcr.io/flux-iac/tofu-controller
      tag: v0.16.3@sha256:e16d8295e66f73d66f6904a9129d8aedfa84612d1e8b5a8e122fda99d28af09c

    runner:
      image:
        repository: ghcr.io/flux-iac/tf-runner
        tag: v0.16.2@sha256:0c1edb866c74f489bd6f66b5703b0b84f6d6d8d2d3029db105a32f3833ff5b0b
      grpc:
        maxMessageSize: 30
      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 400m
          memory: 64Mi

    metrics:
      enabled: true

    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      seccompProfile:
        type: RuntimeDefault
